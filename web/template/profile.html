{{ template "header.html"}}

<!-- Header nav -->
<header class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-lg border-b border-zinc-100">
    <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-violet-500 to-blue-500 flex items-center justify-center">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M8 2L3 4.5V7.5C3 11 5 14 8 15C11 14 13 11 13 7.5V4.5L8 2Z" fill="white"/>
                </svg>
            </div>
            <span class="font-semibold text-zinc-900 text-sm">OAuth 2.0</span>
        </div>
        <nav class="flex items-center gap-6">
            <a href="/" class="text-sm text-zinc-600 hover:text-zinc-900 transition-colors">Home</a>
            <a href="/profile" class="text-sm text-zinc-900 font-medium">Profile</a>
        </nav>
    </div>
</header>

<!-- Main content -->
<div class="min-h-screen flex items-center justify-center px-4 pt-16 relative z-10">
    <div class="card p-12 max-w-[380px] w-full text-center stagger">
        <!-- Avatar with ring -->
        <div class="flex justify-center mb-6 avatar-wrapper">
            <img class="w-24 h-24 rounded-full avatar-ring object-cover" src="/avatar" alt="{{.Profile.Name}}" onerror="this.onerror=null;this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 96 96%27%3E%3Crect width=%2796%27 height=%2796%27 rx=%2748%27 fill=%27%237C3AED%27/%3E%3Ctext x=%2748%27 y=%2758%27 text-anchor=%27middle%27 fill=%27white%27 font-size=%2736%27 font-family=%27Arial%27%3E{{.Profile.Name}}%3C/text%3E%3C/svg%3E'">
            <div class="verified-badge">
                <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                    <path d="M2 5L4 7L8 3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
        </div>

        <!-- Name -->
        <h1 class="text-xl font-semibold text-zinc-900 mb-1">{{.Profile.Name}}</h1>
        <p class="text-sm text-zinc-500 mb-8">{{.Profile.Email}}</p>

        <!-- Info -->
        <div class="space-y-2 mb-8 text-left">
            <div class="info-row">
                <div class="w-9 h-9 rounded-lg bg-violet-50 flex items-center justify-center flex-shrink-0">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <circle cx="8" cy="5" r="3" stroke="#7C3AED" stroke-width="1.5"/>
                        <path d="M2 14C2 11.2 4.7 9 8 9C11.3 9 14 11.2 14 14" stroke="#7C3AED" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="min-w-0 flex-1">
                    <p class="text-[10px] text-zinc-400 uppercase tracking-widest font-medium">Nickname</p>
                    <p class="text-sm text-zinc-900 font-medium truncate">{{.Profile.Nickname}}</p>
                </div>
            </div>

            <div class="info-row">
                <div class="w-9 h-9 rounded-lg bg-blue-50 flex items-center justify-center flex-shrink-0">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <rect x="2" y="4" width="12" height="9" rx="2" stroke="#3B82F6" stroke-width="1.5"/>
                        <path d="M2 6L8 10L14 6" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="min-w-0 flex-1">
                    <p class="text-[10px] text-zinc-400 uppercase tracking-widest font-medium">Email</p>
                    <p class="text-sm text-zinc-900 font-medium truncate">{{.Profile.Email}}</p>
                </div>
            </div>
        </div>

        <!-- Divider -->
        <div class="h-px bg-zinc-100 mb-6"></div>

        <!-- Logout -->
        <a href="/logout" class="btn-ghost">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M6 14H3C2.45 14 2 13.55 2 13V3C2 2.45 2.45 2 3 2H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M11 12L14 8L11 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M14 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Sign out
        </a>
    </div>
</div>

<!-- Footer -->
<footer class="fixed bottom-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-lg border-t border-zinc-100">
    <div class="max-w-5xl mx-auto px-6 h-12 flex items-center justify-between">
        <p class="text-xs text-zinc-400">&copy; 2026 OAuth 2.0 SSO</p>
        <div class="flex items-center gap-4">
            <a href="#" class="text-zinc-400 hover:text-zinc-600 transition-colors">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                </svg>
            </a>
        </div>
    </div>
</footer>
