name: Blog Post Workflow

on:
  schedule:
    - cron: "0 */6 * * *"  # Каждые 6 часов
  workflow_dispatch:

jobs:
  update-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Latest Dev.to Blog Posts
        uses: gautamkrishnar/blog-post-workflow@master
        with:
          feed_list: "https://dev.to/feed/qqwozz"
          max_post_count: 5
          file_path: "docs/BLOG.md"
          template: "$newline- [$title]($url) - $date"
