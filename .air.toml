#:schema https://json.schemastore.org/air.json

root = "."
tmp_dir = "build"

[build]
  bin = "go run ."
  cmd = "go build -o ./build/main.exe ."
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "build"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  include_file = []
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

  [build.windows]
    bin = "go run ."
    cmd = "go build -o ./build/main.exe ."
    entrypoint = ["build/main.exe"]
    full_bin = ""

[color]
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  clean_on_exit = true

[proxy]
  app_port = 0
  app_start_timeout = 0
  enabled = false
  proxy_port = 0

[screen]
  clear_on_rebuild = false
  keep_scroll = true